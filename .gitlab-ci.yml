        curl -s -X POST https://api.telegram.org/bot7197983194:AAFUgFmNsmKy3tj1QKQ2CxsPCLJB5by4IdU/sendMessage \
        -d chat_id=219664642 \
        -d text="Deploy stage failed. Please check the pipeline logs for more details."
      fi
